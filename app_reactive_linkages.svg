<g class="output"><rect x="470" y="448" width="180" height="44" rx="6"/><text class="th" x="560" y="466" text-anchor="middle">Land cover chart</text><text class="ts" x="560" y="482" text-anchor="middle">NLCD bar chart</text></g>
