<g class="reactive"><rect x="230" y="198" width="160" height="44" rx="6"/><text class="th" x="310" y="216" text-anchor="middle">wq_station()</text><text class="ts" x="310" y="232" text-anchor="middle">single station rows</text></g>
<g class="reactive"><rect x="230" y="308" width="160" height="44" rx="6"/><text class="th" x="310" y="326" text-anchor="middle">selected_ws()</text><text class="ts" x="310" y="342" text-anchor="middle">sf polygon</text></g>
<g class="reactive"><rect x="230" y="378" width="160" height="44" rx="6"/><text class="th" x="310" y="396" text-anchor="middle">nlcd_in_ws()</text><text class="ts" x="310" y="412" text-anchor="middle">crop + mask raster</text></g>
<g class="reactive"><rect x="230" y="448" width="160" height="44" rx="6"/><text class="th" x="310" y="466" text-anchor="middle">nlcd_summary()</text><text class="ts" x="310" y="482" text-anchor="middle">pixel count table</text></g>
