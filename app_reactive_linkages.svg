<g class="input"><rect x="30" y="68" width="130" height="44" rx="6"/><text class="th" x="95" y="86" text-anchor="middle">Variable</text><text class="ts" x="95" y="102" text-anchor="middle">dropdown</text></g>
<g class="input"><rect x="30" y="128" width="130" height="44" rx="6"/><text class="th" x="95" y="146" text-anchor="middle">Date range</text><text class="ts" x="95" y="162" text-anchor="middle">slider</text></g>
