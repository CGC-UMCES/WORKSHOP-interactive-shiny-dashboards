<text class="ts" x="310" y="148" text-anchor="middle" fill="#888">Step 5.2 (server)</text>
<text class="ts" x="310" y="318" text-anchor="middle" fill="#888">Step 5.2 (server)</text>
<text class="ts" x="560" y="148" text-anchor="middle" fill="#888">Steps 5.3 + 5.4b</text>
