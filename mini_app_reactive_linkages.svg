    .ts  { font-size: 11px; font-weight: 400; fill: #666; }
    .col-header rect { fill: #e8e8e8; stroke: #bbb; stroke-width: 0.5; }
    .input    rect { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.5; }
    .reactive rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
    .output   rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  </style>
</defs>
<g class="col-header"><rect x="30" y="20" width="130" height="28" rx="6"/><text class="th" x="95" y="39" text-anchor="middle">Inputs</text></g>
<g class="col-header"><rect x="230" y="20" width="160" height="28" rx="6"/><text class="th" x="310" y="39" text-anchor="middle">Reactive expressions</text></g>
<g class="col-header"><rect x="470" y="20" width="180" height="28" rx="6"/><text class="th" x="560" y="39" text-anchor="middle">Outputs</text></g>
<g class="input"><rect x="30" y="80" width="130" height="44" rx="6"/><text class="th" x="95" y="98" text-anchor="middle">Variable</text><text class="ts" x="95" y="114" text-anchor="middle">dropdown</text></g>
<g class="input"><rect x="30" y="260" width="130" height="44" rx="6"/><text class="th" x="95" y="278" text-anchor="middle">Click station</text><text class="ts" x="95" y="294" text-anchor="middle">map marker</text></g>
<g class="reactive"><rect x="230" y="80" width="160" height="44" rx="6"/><text class="th" x="310" y="98" text-anchor="middle">station_means()</text><text class="ts" x="310" y="114" text-anchor="middle">mean per station</text></g>
